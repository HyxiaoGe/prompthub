name: Deploy to Dev Server

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: 架构检查
        run: python3 scripts/check_architecture.py

      - name: Lint 检查
        run: |
          pip install ruff -q
          ruff check .

  deploy:
    needs: check
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cd ~/project/prompthub
          git pull
          if git diff HEAD~1 --name-only | grep -qE 'pyproject\.toml|uv\.lock|Dockerfile|docker-compose'; then
            docker compose up -d --build
          else
            docker compose restart
          fi
          docker image prune -f
          docker builder prune --filter "until=72h" -f
