services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prompthub-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reload in dev mode
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://prompthub:prompthub_dev@192.168.1.10:5432/prompthub
      - DATABASE_URL_SYNC=postgresql://prompthub:prompthub_dev@192.168.1.10:5432/prompthub
      - REDIS_URL=redis://192.168.1.10:6379/0
      - APP_ENV=development
      - APP_DEBUG=true
      - CORS_ORIGINS=http://localhost:3000
    env_file:
      - .env  # Load additional vars (API keys etc.) from .env if present
    restart: unless-stopped
    networks:
      - ai-audio-network

networks:
  ai-audio-network:
    external: true