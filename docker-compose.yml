services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prompthub-backend
    ports:
      - "8200:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - ai-audio-network

networks:
  ai-audio-network:
    external: true
